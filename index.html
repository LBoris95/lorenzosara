<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Regalo di nozze</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Italianno&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --green: #6f8f7a;
      --bg: #f8f7f3;
    }

    html, body {
      margin: 0;
      height: 100%;
    }

    body {
      display: grid;
      place-items: center;
      background: var(--bg);
      font-family: "Libre Baskerville", serif;
    }

    .poster {
      width: min(520px, 100vw);
      aspect-ratio: 2 / 3;
      background: url("sfondo_fiori.png") center/cover no-repeat;
    }

    .content {
      height: 100%;
      padding: clamp(60px, 10vw, 90px) clamp(20px, 5vw, 32px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 14px;
    }

    h1 {
      font-family: "Italianno", cursive;
      font-size: clamp(48px, 9vw, 70px);
      color: var(--green);
      margin: 0;
    }

    .subtitle {
      font-size: clamp(16px, 3.5vw, 22px);
      line-height: 1.55;
      color: var(--green);
      max-width: 36ch;
      margin: 0;
    }

    .thanks {
      margin-top: -6px;
      font-style: italic;
      letter-spacing: 0.03em;
    }

    .divider {
      width: 60%;
      height: 1.5px;
      background: var(--green);
      opacity: 0.8;
      margin: 4px 0;
    }

    .iban {
      font-size: clamp(15px, 3.2vw, 21px);
      letter-spacing: 0.04em;
      color: var(--green);
      word-break: break-word;
      user-select: all;
      margin: 0;
    }

    .intestazione {
      font-size: clamp(13px, 2.8vw, 18px);
      color: var(--green);
      opacity: 0.9;
      margin-top: -6px;
    }

    button {
      margin-top: 8px;
      padding: 10px 18px;
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      background: transparent;
      border: 2px solid var(--green);
      color: var(--green);
      cursor: pointer;
    }

    button:hover {
      background: rgba(111,143,122,0.12);
    }

    .hint {
      font-size: 13px;
      color: var(--green);
      min-height: 1.2em;
    }
  </style>
</head>

<body>
  <main class="poster">
    <section class="content">
      <h1>Regalo di nozze</h1>

      <p class="subtitle">
        Se volete contribuire al nostro viaggio di nozze in Giappone
      </p>

      <p class="subtitle thanks">Grazie!</p>

      <div class="divider"></div>

      <p class="iban" id="iban">
        IBAN: IT73L0301503200000004352041
      </p>

      <p class="intestazione">
        Intestato a Boraso Lorenzo e Sara Verardo
      </p>

      <button onclick="copyIban()">Copia IBAN</button>
      <p class="hint" id="hint"></p>
    </section>
  </main>

  <script>
    function copyIban() {
      const iban = "IT73L0301503200000004352041";
      const hint = document.getElementById("hint");

      navigator.clipboard.writeText(iban).then(() => {
        hint.textContent = "IBAN copiato ✓";
        setTimeout(() => hint.textContent = "", 2000);
      }).catch(() => {
        hint.textContent = "Copia manualmente l'IBAN.";
      });
    }
  </script>
</body>
</html>
